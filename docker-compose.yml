version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: assetflow-backend:latest
    container_name: assetflow-backend-srv
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_FILE=./src/database/assetflow.sqlite
    networks:
      - assetflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: assetflow-frontend:latest
    container_name: assetflow-frontend-client
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    networks:
      - assetflow-network

networks:
  assetflow-network:
    driver: bridge
